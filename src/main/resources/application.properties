spring.application.name=authentication-server,config-server
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.label=develop
spring.profiles.active=containerdev
spring.cloud.compatibility-verifier.enabled=false

# Server Configuration
server.port=${AUTHENTICATION_SERVER_PORT:8090}

# Management Configuration
management.server.ssl.enabled=false
management.endpoint.health.access=read_only
management.health.diskspace.enabled=false
management.endpoints.web.exposure.include=health,loggers,info,decrypt
management.endpoints.web.path-mapping.loggers=loggers
management.endpoints.web.path-mapping.health=health
management.endpoints.web.path-mapping.info=info
management.endpoints.web.path-mapping.decrypt=decrypt

management.endpoint.health.probes.add-additional-paths=true
management.server.port=${server.port}
jasypt.encryptor.password=${JASYPT_ENCRYPTOR_PASSWORD}
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9000

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/