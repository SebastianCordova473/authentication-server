name: Deploy Config Server

on:
  push:
    branches:
      - develop
      - staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Run build and tests + generate coverage
        run: ./gradlew clean build jacocoTestReport --no-daemon

      - name: Report Jacoco Coverage
        uses: madrapps/jacoco-report@v1.3
        with:
          paths: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 85
          min-coverage-changed-files: 85
          title: 🧪 Coverage Jacoco
          update-comment: true

      - name: Install Railway CLI (modern)
        run: npm install -g @railway/cli

      - name: Deploy to Railway (develop)
        if: github.ref == 'refs/heads/develop'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service=authentication-server-dev --detach

      - name: Deploy to Railway (staging)
        if: github.ref == 'refs/heads/staging'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service=authentication-server-staging --detach